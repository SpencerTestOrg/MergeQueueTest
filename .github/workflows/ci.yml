name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  sample-workflow:
    runs-on: ubuntu-latest

    steps:

      - name: Print Something
        run: |
          echo "test"
          sleep 100
          echo "looks good"
          

      - name: Force failure if requested
        if: contains(github.event.pull_request.title, '(fail)')
        run: |
          echo "Failing because PR title contains (fail)"
          exit 1

      
